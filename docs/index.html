<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚽ Mundial 2026</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--green:#00a651;--green2:#007a3d;--green3:#004d26;--gold:#d4a017;--red:#e63946;--dark:#f4f7fb;--dark2:#ffffff;--dark3:#eef3f8;--dark4:#dbe4ee;--text:#10213a;--text2:#5b6b7e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
.app-header{background:linear-gradient(135deg,#e8f7ef 0%,#dff6e9 50%,#e8f7ef 100%);border-bottom:2px solid var(--gold);padding:10px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,100,50,.12)}
.header-title{font-size:20px;font-weight:700;color:var(--green3)}
.header-sub{font-size:11px;color:#4b5f70;margin-top:1px}
.live-btn{display:flex;align-items:center;gap:6px;background:rgba(0,166,81,.12);border:1px solid rgba(0,166,81,.25);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--green3);cursor:pointer;transition:.2s;font-family:inherit}
.live-btn:hover{background:rgba(0,166,81,.2)}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.live-dot.pulse{animation:lpulse 1.4s ease-in-out infinite}
.live-dot.spinning{background:transparent;border:2px solid #22c55e;border-top-color:transparent;animation:spin .7s linear infinite}
@keyframes lpulse{0%,100%{opacity:1;box-shadow:0 0 4px #6fff6f}50%{opacity:.3;box-shadow:0 0 14px #6fff6f}}
@keyframes spin{to{transform:rotate(360deg)}}

.app-tabs{background:var(--dark2);border-bottom:1px solid var(--dark4);display:flex;position:sticky;top:61px;z-index:99;overflow-x:auto;scrollbar-width:none}
.app-tabs::-webkit-scrollbar{display:none}
.app-tab{flex:1;min-width:60px;border:none;background:none;color:var(--text2);font-size:12px;font-weight:600;padding:11px 4px;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;font-family:inherit;white-space:nowrap}
.app-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.app-tab:hover:not(.active){color:var(--text)}

.sec{display:none;padding:12px;max-width:480px;margin:0 auto;padding-bottom:40px}
.sec.active{display:block}

/* MATCH CARD */
.mc{background:var(--dark2);border:1px solid var(--dark4);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.mc:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.mc.is-today{border-color:rgba(0,166,81,.5);box-shadow:0 0 0 1px rgba(0,166,81,.3)}
.mc.is-live{border-color:var(--red);animation:liveborder 2s ease-in-out infinite}
@keyframes liveborder{0%,100%{box-shadow:0 0 0 1px var(--red),0 4px 16px rgba(230,57,70,.15)}50%{box-shadow:0 0 0 2px var(--red),0 4px 24px rgba(230,57,70,.4)}}

.mc-top{display:flex;justify-content:space-between;align-items:center;padding:7px 13px;background:var(--dark3);font-size:11px}
.spill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase}
.sp-g{background:rgba(0,166,81,.2);color:#6fff9f;border:1px solid rgba(0,166,81,.3)}
.sp-32{background:rgba(33,146,255,.2);color:#82cbff;border:1px solid rgba(33,146,255,.3)}
.sp-16{background:rgba(168,85,247,.2);color:#d8a8ff;border:1px solid rgba(168,85,247,.3)}
.sp-qf{background:rgba(255,184,0,.2);color:#ffe066;border:1px solid rgba(255,184,0,.3)}
.sp-sf{background:rgba(255,100,0,.2);color:#ffb366;border:1px solid rgba(255,100,0,.3)}
.sp-fn{background:rgba(230,57,70,.2);color:#ff8a8a;border:1px solid rgba(230,57,70,.4)}
.live-tag{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;animation:ltag 1s ease-in-out infinite}
@keyframes ltag{0%,100%{opacity:1}50%{opacity:.5}}

.mc-body{padding:14px}
.teams{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:10px}
.team{text-align:center;flex:1;min-width:0}
.flag-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--dark4);display:block;margin:0 auto 5px;background:var(--dark3)}
.tname{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-wrap{text-align:center;min-width:76px}
.sc-num{font-size:30px;font-weight:700;color:var(--gold);letter-spacing:-1px;text-shadow:0 0 18px rgba(255,215,0,.3)}
.sc-dash{font-size:24px;color:var(--text2);margin:0 3px}
.sc-time{font-size:13px;color:var(--text2);margin-top:3px}
.sc-live{font-size:11px;color:var(--red);font-weight:700;margin-top:1px}

.venue{font-size:11px;color:var(--text2);text-align:center;margin-bottom:10px}

.pred-box{background:var(--dark3);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.pred-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.pred-bars{display:flex;height:22px;border-radius:6px;overflow:hidden;gap:2px;margin-bottom:4px}
.pseg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.pw{background:linear-gradient(90deg,#006630,#00c861)}
.pd{background:linear-gradient(90deg,#444c58,#5a6270)}
.pl{background:linear-gradient(90deg,#a01020,#e63946)}
.pred-names{display:flex;justify-content:space-between;font-size:10px;color:var(--text2)}

.ai-box{background:linear-gradient(135deg,rgba(168,85,247,.12),rgba(33,146,255,.08));border:1px solid rgba(168,85,247,.25);border-radius:10px;padding:10px 12px;margin-bottom:10px;cursor:pointer;transition:.2s}
.ai-box:hover{border-color:rgba(168,85,247,.5)}
.ai-lbl{font-size:10px;color:#7c3aed;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:4px}
.ai-res{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.ai-det{font-size:11px;color:var(--text2)}

.live-box{background:linear-gradient(135deg,rgba(230,57,70,.12),rgba(255,100,0,.08));border:1px solid rgba(230,57,70,.35);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.live-box-lbl{font-size:10px;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.live-box-txt{font-size:13px;color:var(--text);line-height:1.5}

.alarm{font-size:11px;color:var(--green);margin-top:6px;display:flex;align-items:center;gap:5px}

/* FILTERS */
.fscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.fscroll::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;border:1px solid var(--dark4);background:var(--dark2);color:var(--text2);cursor:pointer;transition:.2s;font-family:inherit}
.fchip.active{background:var(--green);color:#fff;border-color:var(--green)}
.fchip:hover:not(.active){border-color:var(--text2);color:var(--text)}

.sbox{width:100%;background:var(--dark2);border:1px solid var(--dark4);border-radius:10px;padding:9px 14px;font-size:13px;color:var(--text);margin-bottom:12px;font-family:inherit;transition:.2s}
.sbox:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,166,81,.15)}
.sbox::placeholder{color:var(--text2)}

/* BRACKET */
.bm{background:var(--dark2);border:1px solid var(--dark4);border-radius:12px;padding:10px 14px;margin-bottom:8px;cursor:pointer;transition:.2s}
.bm:hover{border-color:rgba(255,215,0,.4)}
.bt{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px}
.bt.win{color:var(--gold);font-weight:700}
.bs{font-weight:700;font-size:15px;min-width:18px;text-align:right}
.bmeta{font-size:10px;color:var(--text2);margin-top:5px}
.tbd{color:var(--dark4);font-style:italic}

/* STATS */
.sc{background:var(--dark2);border:1px solid var(--dark4);border-radius:14px;padding:16px;text-align:center;transition:.2s}
.sc:hover{border-color:var(--green);box-shadow:0 0 16px rgba(0,166,81,.15)}
.sn{font-size:30px;font-weight:700;color:var(--gold);line-height:1}
.sl{font-size:11px;color:var(--text2);margin-top:4px}

/* INFO */
.ibox{border-radius:12px;padding:11px 14px;margin-bottom:12px;border:1px solid}
.ig{background:rgba(0,166,81,.1);border-color:rgba(0,166,81,.3)}
.ir{background:rgba(230,57,70,.1);border-color:rgba(230,57,70,.3)}
.igo{background:rgba(255,215,0,.07);border-color:rgba(255,215,0,.25)}
.ip{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.3)}
.ibox h3{font-size:13px;font-weight:700;margin-bottom:3px}
.ibox p{font-size:12px;color:var(--text2);line-height:1.5;margin:0}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{background:var(--dark2);border:1px solid var(--dark4);border-radius:12px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.history-item .hi-teams{display:flex;flex-direction:column;gap:2px;min-width:0}
.history-item .hi-team{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .hi-meta{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.history-score{font-size:16px;font-weight:700;color:var(--gold);white-space:nowrap}

/* IA */
.ai-ta{width:100%;background:var(--dark2);border:1px solid var(--dark4);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;resize:none;font-family:inherit;line-height:1.5;transition:.2s}
.ai-ta:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,215,0,.1)}
.ai-ta::placeholder{color:var(--text2)}
.ai-resp{background:var(--dark2);border:1px solid var(--dark4);border-radius:10px;padding:12px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin-top:10px}
.qq{width:100%;background:var(--dark2);border:1px solid var(--dark4);border-radius:10px;padding:9px 14px;font-size:12px;cursor:pointer;color:var(--text2);text-align:left;font-family:inherit;margin-bottom:6px;transition:.2s}
.qq:hover{border-color:var(--gold);color:var(--text)}

.sec-ttl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px 2px}
.empty{text-align:center;color:var(--text2);padding:40px 0}
.timeline{position:relative;padding-left:18px;margin-top:6px}
.timeline:before{content:'';position:absolute;left:7px;top:2px;bottom:2px;width:2px;background:linear-gradient(180deg,var(--green),rgba(0,166,81,.18))}
.timeline-item{position:relative;padding:0 0 12px 14px}
.timeline-item:last-child{padding-bottom:0}
.timeline-item:before{content:'';position:absolute;left:-3px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--dark2);box-shadow:0 0 0 2px rgba(0,166,81,.15)}
.timeline-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px}
.timeline-min{font-size:11px;font-weight:700;color:var(--gold)}
.timeline-card{background:var(--dark3);border:1px solid var(--dark4);border-radius:10px;padding:10px 11px}
.timeline-type{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.timeline-text{font-size:12px;color:var(--text);line-height:1.4}
</style>
</head>
<body>

let liveData={}, liveMeta={}, filterStage='resultados', curTab='hoy', busy=false, liveIndex={}, selectedMatchId=null, liveDetails={}, historyMatches=[];

// ===== UTILS =====
const fmtD=d=>{const[,m,dy]=d.split('-');return `${parseInt(dy)} ${MONTHS[parseInt(m)]}`;};
const gtT=t=>{const[h,m]=t.split(':').map(Number);let g=h-1;if(g<0)g+=24;return `${String(g).padStart(2,'0')}:${String(m).padStart(2,'0')}`;};
const alarmT=t=>{const[h,m]=t.split(':').map(Number);let tot=h*60+m-40-60;if(tot<0)tot+=1440;return `${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;};
const played=x=>x.hr!==null&&x.ar!==null;
function fmtClock(status){
  const display=(status?.displayClock||'').trim();
  if(display) return display;
  const raw=Number(status?.clock ?? 0);
  if(!Number.isFinite(raw) || raw<=0) return '';
  return `${Math.floor(raw/60)}'`;
}
function normalizeTeam(value){
  return (value||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'');
}
function getEspnTeamName(name){return TEAM_ALIASES[name]||name;}
function findEspnMatch(homeName, awayName){
  const targetHome=normalizeTeam(getEspnTeamName(homeName));
  const targetAway=normalizeTeam(getEspnTeamName(awayName));
  const events=window.__espnLiveEvents||[];
  return events.find(event=>{
    const comp=event?.competitions?.[0];
    const teams=comp?.competitors||[];
    const home=teams.find(t=>t.homeAway==='home')?.team?.displayName || teams[0]?.team?.displayName || '';
    const away=teams.find(t=>t.homeAway==='away')?.team?.displayName || teams[1]?.team?.displayName || '';
    return normalizeTeam(home)===targetHome && normalizeTeam(away)===targetAway;
  });
}
function pred(x){
  if(x.ph>=50)return{w:x.h,s:`${Math.round(x.ph/30+.4)}-${Math.round(x.pa/35)}`,c:x.ph};
  if(x.pa>=50)return{w:x.a,s:`${Math.round(x.pa/35)}-${Math.round(x.ph/30+.4)}`,c:x.pa};
  return{w:'Empate',s:'1-1',c:x.pd};
}
function compareMatchDate(a,b){
  const av=new Date(`${a.date}T${a.time}:00`);
  const bv=new Date(`${b.date}T${b.time}:00`);
  return av-bv;
}
function ensureHistoryEntry(match){
  if(!match || !played(match)) return;
  if(historyMatches.some(h=>h.id===match.id)) return;
  historyMatches.push({...match});
  historyMatches.sort((a,b)=>compareMatchDate(b,a));
}
function historyItem(x){
  const score=`${x.hr ?? 0} - ${x.ar ?? 0}`;
  return `<div class="history-item">
    <div class="hi-teams">
      <div class="hi-team">${x.h} vs ${x.a}</div>
      <div class="hi-meta">${fmtD(x.date)} · ${x.venue}</div>
    </div>
    <div class="history-score">${score}</div>
  </div>`;
}

function translateEventText(text){
  const t=(text||'').trim();
  if(!t) return '';
  return t
    .replace(/\bYellow card\b/gi,'Tarjeta amarilla')
    .replace(/\bRed card\b/gi,'Tarjeta roja')
    .replace(/\bGoal\b/gi,'Gol')
    .replace(/\bGoal scored\b/gi,'Gol anotado')
    .replace(/\bSubstitution\b/gi,'Cambio')
    .replace(/\bFoul\b/gi,'Falta')
    .replace(/\bFree kick\b/gi,'Tiro libre')
    .replace(/\bOffside\b/gi,'Fuera de juego')
    .replace(/\bPenalty\b/gi,'Penal')
    .replace(/\bCorner\b/gi,'Esquina')
    .replace(/\bOwn goal\b/gi,'Autogol')
    .replace(/\bAssist\b/gi,'Asistencia')
    .replace(/\bHalftime\b/gi,'Entretiempo')
    .replace(/\bBreak\b/gi,'Descanso')
    .replace(/\bInjury time\b/gi,'Tiempo añadido')
    .replace(/\bShot\b/gi,'Disparo');
}
function getLiveEventClass(text){
  const t=(text||'').toLowerCase();
  if(/yellow|tarjeta/i.test(t)) return {icon:'🟨', label:'Tarjeta', color:'var(--gold)'};
  if(/falta|free kick|tiro libre|penal/i.test(t)) return {icon:'⚠️', label:'Falta', color:'var(--red)'};
  if(/gol|score|scored/i.test(t)) return {icon:'⚽', label:'Gol', color:'var(--green)'};
  if(/cambio|substitution|substitute|change/i.test(t)) return {icon:'🔄', label:'Cambio', color:'#4f46e5'};
  return {icon:'🔹', label:'Jugada', color:'var(--text2)'};
}
function parseEventMinute(minute){
  if(!minute) return Number.MAX_SAFE_INTEGER;
  const cleaned=String(minute).trim();
  const match=cleaned.match(/(\d+)/);
  if(!match) return Number.MAX_SAFE_INTEGER;
  return Number(match[1]);
}

async function loadMatchDetail(id){
  const x=M.find(m=>m.id===id); if(!x) return;
  const cached=liveDetails[id];
  if(cached && played(x)) return;
  const match=findEspnMatch(x.h,x.a); if(!match?.id) return;
  try{
    const response=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=${match.id}`,{cache:'no-store'});
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    const data=await response.json();
    const rawEvents=data.keyEvents||[];
    const events=rawEvents.map(ev=>({
      minute: ev.clock?.displayValue || (ev.clock?.value ? `${ev.clock.value}'` : ''),
      text: ev.play?.text || ev.text || ev.type?.text || '',
      type: ev.play?.type?.text || ev.type?.text || ''
    })).filter(ev=>ev.text).sort((a,b)=>parseEventMinute(a.minute)-parseEventMinute(b.minute));
    liveDetails[id]={
      minute: fmtClock(match.competitions?.[0]?.status || {}),
      events
    };
    if(curTab==='live') renderLiveView();
  }catch(e){
    console.warn('No se pudo cargar el resumen detallado del partido:', e);
    liveDetails[id]={minute:'',events:[]};
    if(curTab==='live') renderLiveView();
  }
}

// ===== LIVE FETCH =====
async function fetchLive(){
  if(busy)return; busy=true;
  const dot=document.getElementById('dot'),lbt=document.getElementById('liveT');
  dot.className='live-dot spinning'; lbt.textContent='Actualizando...';
  const today=new Date().toISOString().slice(0,10);
  const pending=M.filter(x=>x.date===today&&!played(x));
  if(!pending.length){dot.className='live-dot pulse';lbt.textContent='EN VIVO';busy=false;return;}

  try{
    const response=await fetch(ESPN_SCOREBOARD_URL,{cache:'no-store'});
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    const data=await response.json();
    window.__espnLiveEvents=data.events||[];

    let changed=false;
    pending.forEach(x=>{
      const match=findEspnMatch(x.h,x.a);
      let msg='';
      let minute=''; let summary=''; let latestAction=''; let score=null; let statusText='';

      if(!match){
        msg=`🕒 ${x.h} vs ${x.a} · Esperando datos de ESPN...`;
      } else {
        const comp=match.competitions?.[0];
        const status=comp?.status?.type||{};
        const homeTeam=comp?.competitors?.find(c=>c.homeAway==='home');
        const awayTeam=comp?.competitors?.find(c=>c.homeAway==='away');
        const homeScore=homeTeam?.score ?? null;
        const awayScore=awayTeam?.score ?? null;
        const state=status.state;
        const period=comp?.status?.period || '';
        const detail=status.detail || '';
        const lastPlay=comp?.situation?.lastPlay?.text || comp?.situation?.lastPlay?.shortText || '';
        const clockText=fmtClock(comp?.status || {});

        if(homeScore!==null&&awayScore!==null){
          score={home:Number(homeScore),away:Number(awayScore)};
        }

        if(state==='in'){
          const halftimeLike=/halftime|entretiempo|interval|break|descanso/i.test((detail||'').toLowerCase());
          if(halftimeLike){
            msg='⏸️ Entretiempo';
            minute='Entretiempo';
            summary=detail || 'Descanso del partido';
            latestAction=detail || 'Descanso del partido';
          } else {
            minute=clockText ? `${clockText}` : (period ? `Periodo ${period}` : 'En juego');
            statusText=detail || 'en juego';
            msg=`⚽ ${x.h} ${homeScore ?? 0}-${awayScore ?? 0} ${x.a} · ${statusText}`;
            summary=lastPlay || 'El partido sigue muy vivo.';
            latestAction=lastPlay || 'El partido sigue muy vivo.';
          }
        } else if(state==='post'){
          if(homeScore!==null&&awayScore!==null){
            x.hr=Number(homeScore); x.ar=Number(awayScore);
            ensureHistoryEntry(x);
            msg=`🏁 Final: ${x.h} ${homeScore}-${awayScore} ${x.a}`;
            minute='Final';
            summary=detail || 'Partido completado';
            latestAction=detail || 'Partido completado';
          } else {
            msg='🏁 Partido finalizado';
            minute='Final';
            summary=detail || 'Partido completado';
            latestAction=detail || 'Partido completado';
          }
        } else if(state==='pre'){
          msg=`🕒 Próximo · ${detail || 'por disputarse'}`;
          minute='Próximo';
          summary=detail || 'El encuentro está por comenzar';
          latestAction=detail || 'El encuentro está por comenzar';
        }
      }

      if(!msg) msg=`🕒 ${x.h} vs ${x.a} · Sin datos en este momento`;
      if(liveData[x.id]!==msg || liveMeta[x.id]?.minute!==minute || liveMeta[x.id]?.summary!==summary || liveMeta[x.id]?.latestAction!==latestAction){
        liveData[x.id]=msg;
        liveMeta[x.id]={minute,summary,score,latestAction};
        changed=true;
      }
    });

    const now=new Date().toLocaleTimeString('es-GT',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpd').textContent=`Actualizado ${now}`;
    if(changed){
      if(curTab==='hoy')renderHoy();
      else if(curTab==='partidos')renderPartidos();
    }
  }catch(e){
    console.warn('No se pudo cargar el scoreboard de ESPN:', e);
  }

  dot.className='live-dot pulse'; lbt.textContent='EN VIVO'; busy=false;
}

// ===== TAB =====
function goTab(id,el){
  document.querySelectorAll('.app-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
  curTab=id;
  if(id==='live') renderLiveView();
}

renderHoy(); renderPartidos(); renderLlaves(); renderStats(); renderLiveView();
setTimeout(fetchLive,1500);
setInterval(fetchLive, 30000);
