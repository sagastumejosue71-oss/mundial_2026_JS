name: Aviso por correo 40 min antes del partido

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Enviar avisos pendientes
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: node scripts/email-alert.mjs

      - name: Commit estado de notificaciones
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notified.json
          git diff --cached --quiet || git commit -m "chore: actualizar avisos de correo enviados [skip ci]"
          git push
